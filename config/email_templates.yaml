# ─────────────────────────────────────────────

alumni_email:
  subject: "{ROLE}, USC Grad"
  body: |
    Hello,

    Hope all is well. My name is {NAME}, and I am a fellow USC Trojan. I recently graduated with experience in investment banking and other finance-related roles. I wanted to reach out as I have recently applied to the {ROLE} at {COMPANY}.

    I am very excited by the opportunity to contribute in a role focused on {ROLE_FOCUS}. I have attached my resume for reference and would greatly appreciate the opportunity to talk about how I can contribute to the role and team if possible.

    Thank you for your time. {SIGN_OFF}

    Best,
    {NAME}

